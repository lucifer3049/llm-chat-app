# One-command-up stack: PostgreSQL + API + Vue frontend (PLAN Day 6).
#   docker compose up --build
# The frontend lives in the sibling repo ../vue_llm (front-end/back-end split);
# nginx serves the built SPA and reverse-proxies /auth /chat /admin /health to
# the api service, so the browser stays same-origin (no CORS needed in compose).
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
    # Exposed for local debugging; remove in production.
    ports:
      - "5999:5432"

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Inside the compose network the DB is reachable at service name "db"
      # on Postgres's internal port 5432. The host mapping 5999:5432 below is
      # only for connecting from the host machine, not from inside the network.
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # Vue 3 SPA built to static files and served by nginx (which also proxies the
  # API). Context points at the sibling frontend repo.
  frontend:
    build:
      context: ../vue_llm
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "5173:80"

volumes:
  pgdata:
